on:
  workflow_call:
    secrets:
      RENOVATE_TOKEN: { required: true }
  schedule: [{ cron: "30 2 * * *" }]
  workflow_dispatch: {}

jobs:
  renovate:
    runs-on: ubuntu-latest

    permissions:
      issues: read
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: renovatebot/github-action@v46.1.9
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_GIT_AUTHOR: github-actions[bot] <3051899+github-actions[bot]@users.noreply.github.com>
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
          RENOVATE_PLATFORM: github
